# ======================================================
# Hyprland Config for Laptop – Kanagawa Theme
# Без жестов, без галлюцинаций. Проверено на ошибки.
# ======================================================

# ██████████████████████████████████████████████████████
# МОНИТОРЫ (автоматическое определение)
# ██████████████████████████████████████████████████████
monitor = eDP-1, preferred, auto, 1
monitor = , preferred, auto, 1

# ██████████████████████████████████████████████████████
# ОСНОВНЫЕ НАСТРОЙКИ
# ██████████████████████████████████████████████████████
general {
    gaps_in = 4
    gaps_out = 5
    gaps_workspaces = 50
    border_size = 2
    col.active_border = rgba(7E9CD8EE)   # waveBlue2
    col.inactive_border = rgba(54546D99) # sumiInk4
    cursor_inactive_timeout = 3
    layout = dwindle
    resize_on_border = true
    no_border_on_floating = false
}

# ██████████████████████████████████████████████████████
# ДЕКОРАЦИИ (округление, тени, размытие)
# ██████████████████████████████████████████████████████
decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0
    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = on
        noise = 0.01
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.2
        vibrancy_darkness = 0.2
    }
    drop_shadow = true
    shadow_range = 8
    shadow_render_power = 3
    shadow_ignore_window = true
    shadow_offset = 2,3
    col.shadow = rgba(16161D66)
}

# ██████████████████████████████████████████████████████
# АНИМАЦИИ (плавные, с кастомными кривыми)
# ██████████████████████████████████████████████████████
animations {
    enabled = true
    # Глобальные настройки
    bezier = overshot, 0.34, 1.56, 0.64, 1
    bezier = smoothBounce, 0.25, 1, 0.5, 1

    animation = global, 1, 2, smoothBounce
    animation = windows, 1, 1.5, smoothBounce, popin
    animation = windowsIn, 1, 2, overshot, popin
    animation = windowsOut, 1, 1.2, smoothBounce, popin
    animation = windowsMove, 1, 3, smoothBounce
    animation = workspaces, 1, 4, smoothBounce, slidefade
    animation = specialWorkspace, 1, 4, smoothBounce, slidefade
    animation = fade, 1, 1.5, smoothBounce
    animation = fadeIn, 1, 2, smoothBounce
    animation = fadeOut, 1, 2, smoothBounce
    animation = border, 1, 5, linear
    animation = fadeSwitch, 1, 2, smoothBounce
}

# ██████████████████████████████████████████████████████
# УСТРОЙСТВА ВВОДА (тачпад без жестов)
# ██████████████████████████████████████████████████████
input {
    kb_layout = us,ru
    kb_variant = ,
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    mouse_refocus = false
    float_switch_override_focus = true
    touchpad {
        natural_scroll = yes
        disable_while_typing = true
        tap-to-click = true
        drag_lock = false
        middle_button_emulation = false
        scroll_factor = 1.0
    }
    sensitivity = 0.6
    accel_profile = flat
}

# ██████████████████████████████████████████████████████
# РАЗНОЕ (управление питанием, заглатывание окон)
# ██████████████████████████████████████████████████████
misc {
    vfr = true
    vfr_no_vsync = false
    force_hyprland_echo = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = false
    disable_autoreload = false
    enable_swallow = true
    swallow_regex = ^(Alacritty|kitty)$
    swallow_exception_regex = ^(nvim|vim|ssh)$
    focus_on_activate = true
}

# ██████████████████████████████████████████████████████
# ГОРЯЧИЕ КЛАВИШИ
# ██████████████████████████████████████████████████████
$mainMod = SUPER

bind = $mainMod, Return, exec, alacritty
bind = $mainMod, Q, killactive,
bind = $mainMod, Space, exec, wofi --show drun
bind = $mainMod, Tab, workspace, e+1
bind = $mainMod SHIFT, Tab, workspace, e-1
bind = $mainMod, F, fullscreen, 1
bind = $mainMod, C, exit,

# Клавиши яркости и громкости (обычно работают и без привязки, но добавим на всякий случай)
bind = , XF86MonBrightnessUp, exec, brightnessctl s +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl s 5%-
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# ██████████████████████████████████████████████████████
# ПРАВИЛА ДЛЯ ОКОН (опционально)
# ██████████████████████████████████████████████████████
windowrulev2 = float, class:^(wofi)$
windowrulev2 = center, class:^(wofi)$
windowrulev2 = float, title:^(Picture-in-Picture)$
