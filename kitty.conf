# ═══════════════════════════════════════════════════════════
#  ОСНОВНЫЕ НАСТРОЙКИ
# ═══════════════════════════════════════════════════════════
# Моноширинный шрифт с поддержкой лигатур и иконок
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12

# ═══════════════════════════════════════════════════════════
#  ВНЕШНИЙ ВИД (Интеграция Kanagawa)
# ═══════════════════════════════════════════════════════════
background_opacity 0.85
background_blur    32
dynamic_background_opacity no
window_padding_width 8
hide_window_decorations titlebar-only

# Основные цвета темы "Kanagawa"
# Fuji White    #DCD7BA
# Sumi Ink      #1F1F28
# Wave Blue 2   #7E9CD8
# Ronin Yellow  #FF9E3B
# Samurai Red   #C34043
# Dragon Green  #76946A

foreground           #DCD7BA
background           #1F1F28
selection_background #2A2A37
url_color            #7E9CD8
cursor               #FF9E3B

# Базовая 16-цветная палитра (Kanagawa)
color0  #090618
color1  #C34043
color2  #76946A
color3  #C0A36E
color4  #7E9CD8
color5  #957FB8
color6  #6A9589
color7  #C8C093
color8  #727169
color9  #E82424
color10 #98BB6C
color11 #E6C384
color12 #7FB4CA
color13 #938AA9
color14 #7AA89F
color15 #DCD7BA

# ═══════════════════════════════════════════════════════════
#  ПРОИЗВОДИТЕЛЬНОСТЬ (Снижение задержки)
# ═══════════════════════════════════════════════════════════
repaint_delay     10
input_delay       3
sync_to_monitor   yes
shell_integration enabled
editor            nvim

# ═══════════════════════════════════════════════════════════
#  УДОБСТВО РАБОТЫ
# ═══════════════════════════════════════════════════════════
cursor_shape      beam
cursor_trail      3
copy_on_select    yes
open_url_modifiers ctrl+shift
confirm_os_window_close 0
remember_window_size yes
initial_window_width  800
initial_window_height 600
