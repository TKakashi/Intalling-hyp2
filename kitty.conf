#   KITTY TERMINAL CONFIGURATION
# ⚡ Optimized for Performance & Visuals on Hyprland
# ████████████████████████████████████████████████████████████████████████████████

# 1. Внешний вид: стеклянный эффект и отступы
background_opacity 0.85
background_blur 32
window_padding_width 10
hide_window_decorations yes
font_family      FantasqueSansM Nerd Font Mono
font_size 12

# 2. Настройка курсора
cursor_shape beam
cursor_trail 1
cursor_trail_decay 0.1 0.4
mouse_hide_wait 2.0

# 3. Повышение производительности
repaint_delay 10
input_delay 3
sync_to_monitor yes
confirm_os_window_close 0

# 4. Улучшение рабочего процесса
copy_on_select yes
strip_trailing_spaces smart
shell_integration enabled

# 5. Тема Kanagawa (базовые цвета)
foreground           #DCD7BA
background           #1F1F28
selection_background #2A2A37
cursor               #FF9E3B

# 16-цветная палитра
color0  #090618
color1  #C34043
color2  #76946A
color3  #C0A36E
color4  #7E9CD8
