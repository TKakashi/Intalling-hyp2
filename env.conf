#   ENVIRONMENT VARIABLES
# ████████████████████████████████████████████████████████████████████████████████

# Рендеринг и производительность
env = WLR_NO_HARDWARE_CURSORS,1              # Использовать программные курсоры для исправления некоторых багов с GPU[reference:1]
env = WLR_RENDERER,vulkan                    # Использовать Vulkan для рендеринга
env = WLR_RENDER_DRM_DEVICE,/dev/dri/renderD128
env = __GLX_VENDOR_LIBRARY_NAME,nvidia       # Для NVIDIA GPU (опционально)
env = LIBVA_DRIVER_NAME,nvidia               # Для NVIDIA GPU (опционально)

# Порталы и интеграция с桌面 окружением
env = XDG_CURRENT_DESKTOP=Hyprland
env = XDG_SESSION_TYPE=wayland
env = XDG_SESSION_DESKTOP=Hyprland
env = QT_QPA_PLATFORM=wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION=1
env = GDK_BACKEND=wayland,x11
env = SDL_VIDEODRIVER=wayland
env = CLUTTER_BACKEND=wayland
